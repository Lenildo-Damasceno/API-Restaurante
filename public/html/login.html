<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Restaurante</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Bem-vindo</p>
    <h1 class="auth-card__title">Restaurante</h1>
    <p class="auth-card__sub">Faça login para acessar o painel</p>

    <div id="mensagemErro" class="feedback feedback--error" style="display:none"></div>

    <form action="/login" method="post" class="form-grid">
      <label>
        <span>E-mail</span>
        <input type="email" name="email" placeholder="seu@email.com" required autofocus>
      </label>
      <label>
        <span>Senha</span>
        <input type="password" name="password" placeholder="••••••••" required>
      </label>
      <div class="form-actions">
        <button class="button button--full" type="submit">Entrar</button>
      </div>
    </form>

    <div class="auth-card__links">
      <a href="/login/recuperar-senha">Esqueci minha senha</a>
      <a href="/User/cadastroUsuario">Criar conta</a>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search)
  const erro = params.get('erro')
  if (erro) {
    const el = document.getElementById('mensagemErro')
    el.textContent = erro
    el.style.display = 'block'
  }
</script>
</body>
</html>
