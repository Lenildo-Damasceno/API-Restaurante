<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Restaurante</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Novo usuário</p>
    <h1 class="auth-card__title">Criar conta</h1>
    <p class="auth-card__sub">Preencha os dados para se registrar</p>

    <form action="/User" method="post" class="form-grid">
      <label>
        <span>Nome</span>
        <input type="text" name="username" placeholder="Seu nome" required autofocus>
      </label>
      <label>
        <span>E-mail</span>
        <input type="email" name="email" placeholder="seu@email.com" required>
      </label>
      <label>
        <span>Perfil</span>
        <select name="perfil" required>
          <option value="">Selecione o perfil</option>
          <option value="admin">Admin</option>
          <option value="cliente">Cliente</option>
        </select>
      </label>
      <label>
        <span>Senha</span>
        <input type="password" name="password" placeholder="••••••••" required>
      </label>
      <label>
        <span>Confirmar senha</span>
        <input type="password" name="confirmPassword" placeholder="••••••••" required>
      </label>
      <div class="form-actions">
        <button class="button button--full" type="submit">Cadastrar</button>
      </div>
    </form>

    <div class="auth-card__links">
      <a href="/login">Já tenho conta</a>
    </div>
  </div>
</div>
</body>
</html>
